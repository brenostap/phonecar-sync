# ══════════════════════════════════════════════════════════════
# PHONE CART — Sync automático via GitHub Actions
# Roda a cada hora, 24h por dia, de graça
# ══════════════════════════════════════════════════════════════

name: Sync FoneNinja → Supabase

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      resync_produtos:
        description: 'Ressincronizar produtos/acessórios de vendas antigas? (true/false)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run sync
        env:
          FONENINJA_TOKEN:  ${{ secrets.FONENINJA_TOKEN }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          RESYNC_PRODUTOS:  ${{ github.event.inputs.resync_produtos || 'false' }}
        run: node sync.js

      - name: Notify on failure
        if: failure()
        run: echo "::error::Sync falhou! Verifique os logs acima."
